<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispatch Planner</title>
  <link rel="stylesheet" href="style.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // Simple icon components using SVG
    const CalendarIcon = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
    );
    
    const UsersIcon = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </svg>
    );
    
    const WrenchIcon = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
      </svg>
    );
    
    const BriefcaseIcon = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
      </svg>
    );
    
    const EditIcon = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
      </svg>
    );
    
    const XIcon = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    );
    
    const UserPlusIcon = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
        <circle cx="8.5" cy="7" r="4"></circle>
        <line x1="20" y1="8" x2="20" y2="14"></line>
        <line x1="23" y1="11" x2="17" y2="11"></line>
      </svg>
    );
    
    const PlusIcon = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    );
    
    const LockIcon = ({ size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    );

    const jobStages = [
      { id: 1, name: 'Stage 1', className: 'stage-1' },
      { id: 2, name: 'Stage 2', className: 'stage-2' },
      { id: 3, name: 'Stage 3', className: 'stage-3' },
    ];

    const getWeekDates = () => {
      const dates = [];
      const today = new Date();
      for (let i = 0; i < 7; i++) {
        const date = new Date(today);
        date.setDate(today.getDate() + i);
        dates.push(date.toISOString().split('T')[0]);
      }
      return dates;
    };

    const formatDate = (dateString) => {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    };

    // Login Component
    const Login = ({ onLogin }) => {
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [inputFocused, setInputFocused] = useState(false);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (password === '1234') {
          setError('');
          onLogin();
        } else {
          setError('Incorrect password. Please try again.');
          setPassword('');
        }
      };

      return (
        <div style={{
          minHeight: '100vh',
          backgroundColor: '#0f172a',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          padding: '1.5rem',
        }}>
          <div style={{
            maxWidth: '400px',
            width: '100%',
            backgroundColor: 'white',
            padding: '2rem',
            borderRadius: '0.5rem',
            borderTop: '5px solid #FFC107',
            boxShadow: '0 20px 25px -5px rgba(0, 0, 0, 0.3)',
            overflow: 'hidden',
          }}>
            <img
              src="login-logo.png"
              alt="Dispatch Planner"
              className="login-logo-fade"
              style={{ width: '280px', margin: '0 auto 1.1rem auto', display: 'block' }}
            />
            <h1 style={{
              textAlign: 'center',
              color: '#111827',
              fontSize: '1.75rem',
              fontWeight: 700,
              letterSpacing: '-0.025em',
              margin: '0 0 1.25rem 0',
            }}>
              Dispatch Planner
            </h1>
            <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
              <div>
                <label htmlFor="password" style={{ display: 'block', fontSize: '0.65rem', fontWeight: 700, color: '#6b7280', letterSpacing: '0.08em', marginBottom: '0.5rem', textTransform: 'uppercase' }}>
                  Enter Access Key
                </label>
                <input
                  type="password"
                  id="password"
                  value={password}
                  onChange={(e) => {
                    setPassword(e.target.value);
                    setError('');
                  }}
                  placeholder="Enter password"
                  autoFocus
                  style={{
                    width: '100%',
                    height: '3rem',
                    fontSize: '1.1rem',
                    padding: '0 1rem',
                    border: inputFocused ? '2px solid #FFC107' : '2px solid #e5e7eb',
                    borderRadius: '0.375rem',
                    boxSizing: 'border-box',
                    outline: 'none',
                    backgroundColor: '#f9fafb',
                  }}
                  onFocus={() => setInputFocused(true)}
                  onBlur={() => setInputFocused(false)}
                />
              </div>
              {error && (
                <div style={{ color: '#dc2626', fontSize: '0.875rem' }}>{error}</div>
              )}
              <button
                type="submit"
                style={{
                  width: '100%',
                  height: '3.5rem',
                  backgroundColor: '#FFC107',
                  color: '#000',
                  fontWeight: 700,
                  textTransform: 'uppercase',
                  border: 'none',
                  borderRadius: '0.375rem',
                  fontSize: '1rem',
                  cursor: 'pointer',
                }}
                onMouseEnter={(e) => {
                  e.currentTarget.style.backgroundColor = '#e5ad06';
                }}
                onMouseLeave={(e) => {
                  e.currentTarget.style.backgroundColor = '#FFC107';
                }}
              >
                Login
              </button>
              <div style={{
                textAlign: 'center',
                fontSize: '0.7rem',
                color: '#9ca3af',
                margin: '1rem 0 0 0',
              }}>
                <div>© 2026 Will Power Excavation</div>
                <div style={{ whiteSpace: 'nowrap' }}>System Powered by NextGen AI</div>
              </div>
            </form>
          </div>
        </div>
      );
    };

    // Navigation Component
    const Navigation = ({ activeTab, onTabChange, hasUnsavedChanges, isSaving, saveStatus, onSave }) => {
      const tabs = [
        { id: 'dispatch', label: 'Dispatch Board', icon: CalendarIcon },
        { id: 'crews', label: 'Crew Management', icon: UsersIcon },
        { id: 'equipment', label: 'Equipment', icon: WrenchIcon },
        { id: 'jobs', label: 'Active Jobs', icon: BriefcaseIcon },
        { id: 'all_jobs', label: 'All Jobs', icon: BriefcaseIcon },
        { id: 'contacts', label: 'Directory', icon: UsersIcon },
      ];

      const saveButtonLabel = saveStatus === 'saving' ? 'Saving...' : saveStatus === 'success' ? 'Success!' : saveStatus === 'error' ? 'Error' : 'Save Changes';
      const saveButtonBg = saveStatus === 'success' ? '#16a34a' : saveStatus === 'error' ? '#dc2626' : '#FFC107';
      const saveButtonDisabled = !hasUnsavedChanges || isSaving || saveStatus === 'success';

      return (
        <nav className="nav nav-sticky">
          <div className="nav-content">
            <div className="logo">WILL POWER</div>
            <div className="nav-tabs">
              {tabs.map((tab) => {
                const Icon = tab.icon;
                return (
                  <button
                    key={tab.id}
                    onClick={() => onTabChange(tab.id)}
                    className={`nav-tab ${activeTab === tab.id ? 'active' : ''}`}
                  >
                    <Icon size={18} />
                    <span>{tab.label}</span>
                  </button>
                );
              })}
            </div>
            <button
              type="button"
              onClick={onSave}
              disabled={saveButtonDisabled}
              className="btn nav-save-btn"
              style={{
                backgroundColor: saveButtonBg,
                color: saveStatus === 'success' || saveStatus === 'error' ? '#fff' : '#000',
                opacity: saveButtonDisabled && saveStatus === 'idle' ? 0.6 : 1,
                cursor: saveButtonDisabled ? 'not-allowed' : 'pointer',
                transition: 'background-color 0.35s ease, color 0.2s ease',
              }}
            >
              {saveStatus === 'success' ? (
                <span style={{ display: 'inline-flex', alignItems: 'center', gap: '0.35rem' }}>
                  <span style={{ fontSize: '1rem', lineHeight: 1 }}>✓</span>
                  {saveButtonLabel}
                </span>
              ) : (
                saveButtonLabel
              )}
            </button>
          </div>
        </nav>
      );
    };

    // Edit Job Modal
    const EditJobModal = ({ job, isOpen, onClose, onSave }) => {
      const [address, setAddress] = useState('');
      const [stage, setStage] = useState(1);
      const [status, setStatus] = useState('Active');

      useEffect(() => {
        if (job) {
          setAddress(job.address || '');
          setStage(job.stage || 1);
          setStatus(job.status || 'Active');
        }
      }, [job]);

      if (!isOpen || !job) return null;

      const handleSubmit = (e) => {
        e.preventDefault();
        onSave({
          ...job,
          address,
          stage: parseInt(stage),
          status,
        });
        onClose();
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <div className="modal-header">
              <h2 className="modal-title">Edit Job</h2>
              <button onClick={onClose} className="modal-close"><XIcon size={24} /></button>
            </div>
            <form onSubmit={handleSubmit} className="modal-body">
              <div className="form-group">
                <label className="form-label">Job Name</label>
                <input
                  type="text"
                  value={job.name}
                  disabled
                  className="form-input"
                  style={{ backgroundColor: '#f3f4f6', color: '#6b7280' }}
                />
              </div>
              <div className="form-group">
                <label className="form-label">Address</label>
                <input
                  type="text"
                  value={address}
                  onChange={(e) => setAddress(e.target.value)}
                  className="form-input"
                  required
                />
              </div>
              <div className="form-group">
                <label className="form-label">Stage</label>
                <select
                  value={stage}
                  onChange={(e) => setStage(parseInt(e.target.value))}
                  className="form-input"
                >
                  {jobStages.map((s) => (
                    <option key={s.id} value={s.id}>{s.name}</option>
                  ))}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Status</label>
                <select
                  value={status}
                  onChange={(e) => setStatus(e.target.value)}
                  className="form-input"
                >
                  <option value="Active">Active</option>
                  <option value="Closed">Closed</option>
                </select>
              </div>
              <div className="modal-actions">
                <button type="button" onClick={onClose} className="btn-secondary">Cancel</button>
                <button type="submit" className="btn btn-primary">Save Changes</button>
              </div>
            </form>
          </div>
        </div>
      );
    };

    // Dispatch Board Component (Kanban Style)
    const DispatchBoard = ({ jobs, setJobs, crews, setCrews, equipment, setEquipment, setHasUnsavedChanges }) => {
      const [selectedJob, setSelectedJob] = useState(null);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [draggedResource, setDraggedResource] = useState(null);
      const [dragOverColumn, setDragOverColumn] = useState(null);
      const [dragOverUnassigned, setDragOverUnassigned] = useState(false);
      const [pendingCloseJobId, setPendingCloseJobId] = useState(null);

      useEffect(() => {
        if (!pendingCloseJobId) return;
        const previousOverflow = document.body.style.overflow;
        const previousPaddingRight = document.body.style.paddingRight;
        const scrollbarWidth = window.innerWidth - document.documentElement.clientWidth;
        document.body.style.overflow = 'hidden';
        if (scrollbarWidth > 0) {
          document.body.style.paddingRight = `${scrollbarWidth}px`;
        }
        return () => {
          document.body.style.overflow = previousOverflow;
          document.body.style.paddingRight = previousPaddingRight;
        };
      }, [pendingCloseJobId]);

      // Unassigned = no assigned_job_id (or null/undefined)
      const unassignedCrews = crews.filter((c) => !c.assigned_job_id);
      const unassignedEquipment = equipment.filter((e) => !e.assigned_job_id);

      const allResources = [...crews, ...equipment];
      const getResourceName = (resourceId) => {
        const resource = allResources.find((r) => r.id === resourceId);
        return resource ? resource.name : resourceId;
      };

      const getStageInfo = (stageId) => {
        return jobStages.find((s) => s.id === stageId) || jobStages[0];
      };

      const updateResourceAssignment = (resourceId, jobId) => {
        const isCrew = crews.some((c) => c.id === resourceId);
        if (isCrew) {
          setCrews(crews.map((c) => (c.id === resourceId ? { ...c, assigned_job_id: jobId } : c)));
        } else {
          setEquipment(equipment.map((e) => (e.id === resourceId ? { ...e, assigned_job_id: jobId } : e)));
        }
        setHasUnsavedChanges(true);
      };

      const handleDragStart = (e, resourceId) => {
        setDraggedResource(resourceId);
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', resourceId);
      };

      const handleDragOver = (e, jobId) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        setDragOverColumn(jobId);
        setDragOverUnassigned(false);
      };

      const handleDragOverUnassigned = (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        setDragOverUnassigned(true);
        setDragOverColumn(null);
      };

      const handleDragLeave = () => {
        setDragOverColumn(null);
        setDragOverUnassigned(false);
      };

      const handleDrop = (e, jobId) => {
        e.preventDefault();
        const resourceId = e.dataTransfer.getData('text/plain') || draggedResource;
        if (resourceId) {
          updateResourceAssignment(resourceId, jobId);
        }
        setDraggedResource(null);
        setDragOverColumn(null);
        setDragOverUnassigned(false);
      };

      const handleDropUnassigned = (e) => {
        e.preventDefault();
        const resourceId = e.dataTransfer.getData('text/plain') || draggedResource;
        if (resourceId) {
          updateResourceAssignment(resourceId, null);
        }
        setDraggedResource(null);
        setDragOverColumn(null);
        setDragOverUnassigned(false);
      };

      const removeAssignment = (jobId, resourceId) => {
        updateResourceAssignment(resourceId, null);
      };

      const handleEditJob = (job) => {
        setSelectedJob(job);
        setIsModalOpen(true);
      };

      const handleSaveJob = (updatedJob) => {
        setJobs(jobs.map((j) => (j.id === updatedJob.id ? updatedJob : j)));
        setHasUnsavedChanges(true);
      };

      const handleStageChange = (jobId, newStage) => {
        setJobs(jobs.map((j) => (j.id === jobId ? { ...j, stage: parseInt(newStage) } : j)));
        setHasUnsavedChanges(true);
      };

      const handleQuickClose = (jobId) => {
        setJobs(jobs.map((j) => (j.id === jobId ? { ...j, status: 'Closed' } : j)));
        setHasUnsavedChanges(true);
      };

      const requestQuickClose = (jobId) => {
        setPendingCloseJobId(jobId);
      };

      const confirmQuickClose = () => {
        if (!pendingCloseJobId) return;
        handleQuickClose(pendingCloseJobId);
        setPendingCloseJobId(null);
      };

      const cancelQuickClose = () => {
        setPendingCloseJobId(null);
      };

      const pendingCloseJob = pendingCloseJobId ? jobs.find((j) => j.id === pendingCloseJobId) : null;

      return (
        <div style={{ height: 'calc(100vh - 64px)', display: 'flex', overflow: 'hidden' }}>
          {pendingCloseJobId && (
            <div
              onClick={cancelQuickClose}
              style={{
                position: 'fixed',
                inset: 0,
                backgroundColor: 'rgba(0,0,0,0.5)',
                zIndex: 999,
              }}
            >
              <div
                onClick={(e) => e.stopPropagation()}
                style={{
                  position: 'fixed',
                  top: '50%',
                  left: '50%',
                  transform: 'translate(-50%, -50%)',
                  backgroundColor: 'white',
                  padding: '2rem',
                  borderRadius: '0.5rem',
                  boxShadow: '0 20px 25px -5px rgba(0, 0, 0, 0.1)',
                  zIndex: 1000,
                  width: 'min(520px, calc(100vw - 2rem))',
                }}
              >
                <div style={{ fontWeight: 700, fontSize: '1.25rem', color: '#111827', marginBottom: '0.75rem' }}>
                  Confirm Closing Job
                </div>
                <div style={{ color: '#4b5563', fontSize: '0.95rem', marginBottom: '1.5rem' }}>
                  {pendingCloseJob?.name ? `Are you sure you want to close “${pendingCloseJob.name}”?` : 'Are you sure you want to close this job?'}
                </div>
                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: '0.75rem' }}>
                  <button
                    type="button"
                    onClick={cancelQuickClose}
                    className="btn-secondary"
                    style={{ padding: '0.75rem 1rem' }}
                  >
                    Cancel
                  </button>
                  <button
                    type="button"
                    onClick={confirmQuickClose}
                    className="btn btn-primary"
                    style={{ backgroundColor: '#16a34a', padding: '0.75rem 1rem' }}
                  >
                    Confirm
                  </button>
                </div>
              </div>
            </div>
          )}
          {/* Left Sidebar - Unassigned Resources (drop zone to unassign) */}
          <div
            onDragOver={handleDragOverUnassigned}
            onDragLeave={handleDragLeave}
            onDrop={handleDropUnassigned}
            style={{
              width: '280px',
              backgroundColor: dragOverUnassigned ? '#fef3c7' : '#f9fafb',
              borderRight: '1px solid #e5e7eb',
              padding: '1rem',
              overflowY: 'auto',
              border: dragOverUnassigned ? '2px dashed #FFC107' : undefined,
              borderRadius: '0.25rem',
            }}
          >
            <h2 style={{
              fontSize: '1.125rem',
              fontWeight: 600,
              color: '#1f2937',
              marginBottom: '1rem',
              paddingBottom: '0.75rem',
              borderBottom: '2px solid #FFC107'
            }}>
              Unassigned Resources
            </h2>
            
            <div style={{ marginBottom: '1.5rem' }}>
              <h3 style={{
                fontSize: '0.875rem',
                fontWeight: 500,
                color: '#374151',
                marginBottom: '0.75rem'
              }}>
                Crews ({unassignedCrews.length})
              </h3>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                {unassignedCrews.map((crew) => (
                  <div
                    key={crew.id}
                    draggable
                    onDragStart={(e) => handleDragStart(e, crew.id)}
                    style={{
                      backgroundColor: 'white',
                      padding: '0.75rem',
                      borderRadius: '0.375rem',
                      boxShadow: '0 1px 2px rgba(0,0,0,0.05)',
                      border: '1px solid #e5e7eb',
                      cursor: 'move',
                      userSelect: 'none',
                      transition: 'all 0.2s'
                    }}
                    onMouseEnter={(e) => e.currentTarget.style.boxShadow = '0 4px 6px rgba(0,0,0,0.1)'}
                    onMouseLeave={(e) => e.currentTarget.style.boxShadow = '0 1px 2px rgba(0,0,0,0.05)'}
                  >
                    <div style={{ fontWeight: 500, color: '#1f2937', fontSize: '0.875rem' }}>
                      {crew.name}
                    </div>
                    <div style={{ fontSize: '0.75rem', color: '#6b7280', marginTop: '0.25rem' }}>
                      Foreman: {crew.foreman}
                    </div>
                  </div>
                ))}
                {unassignedCrews.length === 0 && (
                  <div style={{ 
                    padding: '0.75rem', 
                    color: '#9ca3af', 
                    fontSize: '0.875rem',
                    fontStyle: 'italic',
                    textAlign: 'center'
                  }}>
                    All crews assigned
                  </div>
                )}
              </div>
            </div>

            <div>
              <h3 style={{
                fontSize: '0.875rem',
                fontWeight: 500,
                color: '#374151',
                marginBottom: '0.75rem'
              }}>
                Equipment ({unassignedEquipment.length})
              </h3>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                {unassignedEquipment.map((equip) => (
                  <div
                    key={equip.id}
                    draggable
                    onDragStart={(e) => handleDragStart(e, equip.id)}
                    style={{
                      backgroundColor: 'white',
                      padding: '0.75rem',
                      borderRadius: '0.375rem',
                      boxShadow: '0 1px 2px rgba(0,0,0,0.05)',
                      border: '1px solid #e5e7eb',
                      cursor: 'move',
                      userSelect: 'none',
                      transition: 'all 0.2s'
                    }}
                    onMouseEnter={(e) => e.currentTarget.style.boxShadow = '0 4px 6px rgba(0,0,0,0.1)'}
                    onMouseLeave={(e) => e.currentTarget.style.boxShadow = '0 1px 2px rgba(0,0,0,0.05)'}
                  >
                    <div style={{ fontWeight: 500, color: '#1f2937', fontSize: '0.875rem' }}>
                      {equip.name}
                    </div>
                  </div>
                ))}
                {unassignedEquipment.length === 0 && (
                  <div style={{ 
                    padding: '0.75rem', 
                    color: '#9ca3af', 
                    fontSize: '0.875rem',
                    fontStyle: 'italic',
                    textAlign: 'center'
                  }}>
                    All equipment assigned

    // Edit Crew Modal
    const EditCrewModal = ({ crew, isOpen, onClose, onSave }) => {

            typeof crew.members === 'string'
              ? crew.members
              : (Array.isArray(crew.members) ? crew.members.join(', ') : '');
          setMembers(initialMembers || '');
        }
      }, [crew]);

      if (!isOpen || !crew) return null;

      const handleSubmit = (e) => {
        e.preventDefault();
        onSave({
          ...crew,
          members: members,
        });
        onClose();
      };

      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>

              <h2 className="modal-title">Edit Crew</h2>

    // Equipment Component

    // Directory Component

    // Active Jobs Component
    const ActiveJobs = ({ jobs, setJobs, crews, equipment, setHasUnsavedChanges }) => {
      const [selectedJob, setSelectedJob] = useState(null);
      const [isModalOpen, setIsModalOpen] = useState(false);

      const getAssignedCount = (jobId) =>
        crews.filter((c) => c.assigned_job_id === jobId).length +
        equipment.filter((e) => e.assigned_job_id === jobId).length;

      const getStageInfo = (stageId) => {

      return (

              <BriefcaseIcon size={20} style={{ marginRight: '0.5rem' }} />

          <div className="card-grid">
            {jobs.filter(j => j.status === 'Active').map((job) => {

          <EditJobModal

    // All Jobs Component (historical ledger, no edit)
    const AllJobs = ({ jobs, crews, equipment }) => {
      const getAssignedCount = (jobId) =>
        crews.filter((c) => c.assigned_job_id === jobId).length +
        equipment.filter((e) => e.assigned_job_id === jobId).length;

      const getStageInfo = (stageId) => {
        return jobStages.find((s) => s.id === stageId) || jobStages[0];
      };

      return (
        <div className="view-container">
          <div className="view-header">
            <h2 className="view-title">All Jobs</h2>
          </div>
          <div className="card-grid">
            {jobs.map((job) => {
              const stageInfo = getStageInfo(job.stage);
              const isClosed = job.status === 'Closed';
              return (
                <div key={job.id} className="info-card">
                  <div className="card-header">
                    <div className="card-icon">
                      <BriefcaseIcon size={24} style={{ color: '#FFC107' }} />
                    </div>
                    <div style={{ flex: 1 }}>
                      <h3 className="card-title">{job.name}</h3>
                      <p className="card-subtitle" style={{ fontSize: '0.75rem', marginTop: '0.25rem' }}>
                        {job.address}
                      </p>
                    </div>
                  </div>
                  <div className={`stage-badge ${stageInfo.className}`}>
                    {stageInfo.name}
                  </div>
                  <div className="card-info">
                    <div className="card-info-row">
                      <span>Assigned Resources:</span>
                      <span style={{ fontWeight: 500 }}>{getAssignedCount(job.id)}</span>
                    </div>
                    <div className="card-info-row">
                      <span>Status:</span>
                      <span className={isClosed ? '' : 'status-active'} style={isClosed ? { color: '#6b7280', fontWeight: 500 } : undefined}>
                        {job.status || 'Active'}
                      </span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    // Main App Component — global state lifted here
    const App = () => {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [activeTab, setActiveTab] = useState('dispatch');
      const [jobs, setJobs] = useState([]);
      const [contacts, setContacts] = useState([]);
      const [crews, setCrews] = useState([]);
      const [equipment, setEquipment] = useState([]);
      const [hasUnsavedChanges, setHasUnsavedChanges] = useState(false);
      const [isSaving, setIsSaving] = useState(false);
      const [saveStatus, setSaveStatus] = useState('idle'); // 'idle' | 'saving' | 'success' | 'error'
      const [isLoading, setIsLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        const run = async () => {
          try {
            const res = await fetch('https://michaelcarey.app.n8n.cloud/webhook/load-dispatch-board', {
              method: 'GET',
              headers: { 'Accept': 'application/json' },
            });

            const rawText = await res.text();
            console.log('n8n raw response:', rawText);

            if (!res.ok) {
              throw new Error(`Request failed (${res.status}): ${rawText}`);
            }

            const trimmed = (rawText || '').trim();
            if (!trimmed) {
              throw new Error('Invalid JSON from n8n: ' + rawText);
            }

            let data;
            try {
              data = JSON.parse(trimmed);
            } catch (parseErr) {
              throw new Error('Invalid JSON from n8n: ' + rawText);
            }
            if (Array.isArray(data)) data = data[0];

            setJobs(Array.isArray(data?.jobs) ? data.jobs : []);
            setContacts(Array.isArray(data?.contacts) ? data.contacts : []);
            setCrews(Array.isArray(data?.crews) ? data.crews : []);
            setEquipment(Array.isArray(data?.equipment) ? data.equipment : []);
            setIsLoading(false);
          } catch (err) {
            setError(err?.message || String(err));
            setIsLoading(false);
          }
        };

        run();
      }, []);

      const handleSave = async () => {
        setIsSaving(true);
        setSaveStatus('saving');
        try {
          const payload = { jobs, crews, equipment };
          const res = await fetch('https://michaelcarey.app.n8n.cloud/webhook/save-dispatch-board', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error('Failed to save changes');
          setHasUnsavedChanges(false);
          setSaveStatus('success');
          setTimeout(() => setSaveStatus('idle'), 3000);
        } catch (err) {
          setSaveStatus('error');
          alert('Error saving data: ' + err.message);
          setTimeout(() => setSaveStatus('idle'), 4000);
        } finally {
          setIsSaving(false);
        }
      };

      const handleLogin = () => {
        setIsAuthenticated(true);
      };

      const renderContent = () => {
        switch (activeTab) {
          case 'dispatch':
            return (
              <DispatchBoard
                jobs={jobs}
                setJobs={setJobs}
                crews={crews}
                setCrews={setCrews}
                equipment={equipment}
                setEquipment={setEquipment}
                setHasUnsavedChanges={setHasUnsavedChanges}
              />
            );
          case 'crews':
            return <CrewManagement crews={crews} setCrews={setCrews} setHasUnsavedChanges={setHasUnsavedChanges} />;
          case 'equipment':
            return <Equipment equipment={equipment} />;
          case 'jobs':
            return (
              <ActiveJobs
                jobs={jobs}
                setJobs={setJobs}
                crews={crews}
                equipment={equipment}
                setHasUnsavedChanges={setHasUnsavedChanges}
              />
            );
          case 'all_jobs':
            return <AllJobs jobs={jobs} crews={crews} equipment={equipment} />;
          case 'contacts':
            return <Directory contacts={contacts} />;
          default:
            return (
              <DispatchBoard
                jobs={jobs}
                setJobs={setJobs}
                crews={crews}
                setCrews={setCrews}
                equipment={equipment}
                setEquipment={setEquipment}
                setHasUnsavedChanges={setHasUnsavedChanges}
              />
            );
        }
      };

      if (!isAuthenticated) {
        return <Login onLogin={handleLogin} />;
      }

      if (isLoading) {
        return (
          <div style={{
            height: '100vh',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            backgroundColor: '#f3f4f6',
            color: '#1f2937',
            fontWeight: 600,
            fontSize: '1.125rem',
          }}>
            Loading Dispatch Board...
          </div>
        );
      }

      if (error) {
        return (
          <div style={{
            height: '100vh',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
            backgroundColor: '#f3f4f6',
            padding: '2rem',
          }}>
            <div style={{
              maxWidth: '720px',
              width: '100%',
              backgroundColor: 'white',
              border: '1px solid #e5e7eb',
              borderRadius: '0.5rem',
              padding: '1.5rem',
              boxShadow: '0 10px 15px rgba(0,0,0,0.08)',
            }}>
              <div style={{ fontSize: '1rem', fontWeight: 700, color: '#b91c1c', marginBottom: '0.5rem' }}>
                Error loading dispatch board
              </div>
              <div style={{ color: '#b91c1c', fontSize: '0.875rem' }}>{error}</div>
            </div>
          </div>
        );
      }

      return (
        <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', backgroundColor: '#f3f4f6' }}>
          <Navigation
            activeTab={activeTab}
            onTabChange={setActiveTab}
            hasUnsavedChanges={hasUnsavedChanges}
            isSaving={isSaving}
            saveStatus={saveStatus}
            onSave={handleSave}
          />
          <div style={{ flex: 1, overflowY: 'auto' }}>
            {renderContent()}
          </div>
        </div>
      );
    };

    // Render App - wait for DOM to be ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', renderApp);
    } else {
      renderApp();
    }
    
    function renderApp() {
      const rootElement = document.getElementById('root');
      if (rootElement && React && ReactDOM) {
        try {
          const root = ReactDOM.createRoot(rootElement);
          root.render(React.createElement(App));
        } catch (error) {
          console.error('Error rendering app:', error);
          rootElement.innerHTML = '<div style="padding: 20px; color: red;">Error loading application. Please check the browser console.</div>';
        }
      }
    }
  </script>
</body>
</html>
